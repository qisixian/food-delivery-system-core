receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  debug:
    verbosity: detailed
  otlphttp/loki:
    endpoint: http://host.containers.internal:3100/otlp
    tls:
      insecure: true
  otlp/tempo:
    endpoint: http://host.containers.internal:4319
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug, otlp/tempo]
    logs:
      receivers: [otlp]
      exporters: [otlphttp/loki]
#      exporters: [debug, otlphttp/loki]
#      exporters: [debug]
#    metrics:
#      receivers: [otlp]
#      exporters: [debug]
