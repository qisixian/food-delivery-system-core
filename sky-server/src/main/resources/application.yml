server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    driver-class-name: ${sky.datasource.driver-class-name}
    url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${sky.datasource.username}
    password: ${sky.datasource.password}
  data:
    redis:
      host: ${sky.redis.host}
      port: ${sky.redis.port}
      password: ${sky.redis.password}
      database: ${sky.redis.database}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus # loggers # 需要鉴权保护

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  structured:
    format:
      console: logstash
  level:
    com.sky.mapper: info
    com.sky.service: info
    com.sky.controller: info
#    com.sky.controller.user.OrderController: trace
#    com.sky.controller.admin.SetmealController: trace

otel:
  java:
    disabled:
      resource:
        providers: io.opentelemetry.instrumentation.resources.ProcessResourceProvider
  service:
    name: food-delivery-system-core
  exporter:
    otlp:
      endpoint: http://host.containers.internal:4318
      protocol: http/protobuf
  traces:
    exporter: otlp
  logs:
    exporter: otlp
  metrics:
    exporter: none
  instrumentation:
    common:
      default-enabled: false
    logback-appender:
      enabled: true
      experimental:
        capture-mdc-attributes: '*'
        capture-key-value-pair-attributes: true
    logback-mdc:
      enabled: true
    spring-web:
      enabled: true
    spring-webmvc:
      enabled: true
    jdbc:
      enabled: true


# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.sky.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn

sky:
  employee-default-password: ${EMPLOYEE_DEFAULT_PASSWORD:}
  jwt:
    # 设置jwt签名加密时使用的秘钥
#    admin-secret-key: itcast
    admin-secret-key: GQmANafNXXEPv5Dq2pwqqnIi0Z1lQbP+2WTQkd3CLhM=
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    user-secret-key: GQmANafNXXEPv5Dq2pwqqnIi0Z1lQbP+2WTQkd3CLhM=
    user-ttl: 7200000
  oauth2:
    google:
      auth-url: https://accounts.google.com/o/oauth2/v2/auth
      client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
      client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
      redirect-uri: http://localhost:8080/user/auth/google/callback
      token-url: https://oauth2.googleapis.com/token
      scope: openid
      frontend-callback-url: http://localhost:5173/oauth/callback
      user-info-url: https://www.googleapis.com/oauth2/v2/userinfo
